# Backend: Dockerfile ビルド → Artifact Registry → Cloud Run（API）
# トリガ例: ブランチ ^main$、パス backend/**
substitutions:
  _REGION: asia-northeast2
  _AR_REPOSITORY: pathway-go
  _API_IMAGE: app
  _CLOUD_RUN_API_SERVICE: pathway-service

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 900s

steps:
  - id: docker-build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --target=production
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_API_IMAGE}:$SHORT_SHA
      - .

  - id: docker-push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_API_IMAGE}:$SHORT_SHA
    waitFor:
      - docker-build-api

  - id: run-deploy-api
    name: gcr.io/google.com/cloudsdks/gcloud
    args:
      - run
      - deploy
      - ${_CLOUD_RUN_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPOSITORY}/${_API_IMAGE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --quiet
    waitFor:
      - docker-push-api
