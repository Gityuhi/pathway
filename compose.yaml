services:
  db:
    image: postgres:14
    container_name: pathway-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    ports:
      - ${POSTGRES_PORT}:5432
    restart: always
  
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    container_name: pathway-api-prod
    ports:
      - ${API_PORT}:8080
    environment:
      - DB_SOURCE=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable
    depends_on:
      - db
    restart: always

volumes:
  postgres-data-prod:
    driver: local


