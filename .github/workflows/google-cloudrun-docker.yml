name: 'Build and Deploy to Cloud Run'

on:
  push:
    branches:
      - 'main'

env:
  PROJECT_ID: 'pathway-492603' 
  REGION: 'asia-northeast2'
  SERVICE: 'pathway-service'
  WORKLOAD_IDENTITY_PROVIDER: 'projects/950237003011/locations/global/workloadIdentityPools/pathway-go/providers/pathway-go'
  SERVICE_ACCOUNT: '950237003011-compute@developer.gserviceaccount.com'
  REPOSITORY: 'pathway-go'
  IMAGE_NAME: 'app'

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      # Configure Workload Identity Federation and generate an access token.
      #
      # See https://github.com/google-github-actions/auth for more options,
      # including authenticating via a JSON credentials file.
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2' # google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: ${{ env.SERVICE_ACCOUNT }}
          token_format: 'access_token'
          project_id: '${{ env.PROJECT_ID }}'

      # BEGIN - Docker auth and build
      #
      # If you already have a container image, you can omit these steps.
      - name: 'Docker Auth'
        uses: 'docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567' # docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          registry: '${{ env.REGION }}-docker.pkg.dev'
          password: ${{ steps.auth.outputs.access_token }}

      - name: 'Build and Push Container'
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          docker build -f backend/Dockerfile -t "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"
          echo "DOCKER_TAG=${DOCKER_TAG}" >> $GITHUB_ENV

      # END - Docker auth and build

      - id: deploy
        name: 'Deploy to Cloud Run'
        uses: 'google-github-actions/deploy-cloudrun@33553064113a37d688aa6937bacbdc481580be17' # google-github-actions/deploy-cloudrun@v2
        with:
          service: '${{ env.SERVICE }}'
          region: '${{ env.REGION }}'
          project_id: '${{ env.PROJECT_ID }}'
          image: '${{ env.DOCKER_TAG }}'
      # If required, use the Cloud Run URL output in later steps
      - name: 'Show output'
        run: echo ${{ steps.deploy.outputs.url }}
