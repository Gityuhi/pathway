services:
  db:
    container_name: pathway-db-dev
    ports:
      - ${POSTGRES_PORT}:5432
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data

  api:
    build:
      target: development
    container_name: pathway-api-dev
    ports:
      - ${API_PORT}:8080
    volumes:
      - ./:/app
    environment:
      - DB_SOURCE=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=disable

volumes:
  postgres-data-dev:
    driver: local
