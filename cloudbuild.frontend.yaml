# Frontend: frontend/ ソースからビルド（Cloud Run の --source）→ Cloud Run（Web）
# 生成イメージは GCP がプロジェクトの Artifact Registry に保管する（--source ビルドの既定動作）
# トリガ例: ブランチ ^main$、パス frontend/**
substitutions:
  _REGION: asia-northeast2
  _CLOUD_RUN_WEB_SERVICE: pathway-next

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s

steps:
  - id: run-deploy-web
    name: gcr.io/google.com/cloudsdks/gcloud
    args:
      - run
      - deploy
      - ${_CLOUD_RUN_WEB_SERVICE}
      - --source=frontend
      - --region=${_REGION}
      - --platform=managed
      - --quiet
